<body>
  <nav class="top-nav">
    <a href="index.html" class="top-nav-logo">Nico Baldoni</a>

    </ul>
  </nav>
  <main>
    <div class="contact-wrap">
      <p class="contact-heading">Tell me about you.</p>
      <form class="contact-form" action="https://formspree.io/f/mjgdooka" method="POST">
        <div class="form-field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="form-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-field">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" required></textarea>
        </div>
        <button type="submit" class="form-submit">Send</button>
      </form>
    </div>
  </main>
  <nav class="nav-panel" id="nav-panel"><ul class="nav-links"><li><a href="works.html">Works</a></li><li><a href="commissions.html">Commissions</a></li><li><a href="about.html">About</a></li><li><a href="contact.html">Contact</a></li></ul></nav><div class="nav-overlay" id="nav-overlay"></div>
